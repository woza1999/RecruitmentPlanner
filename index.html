<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruitment Planner</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Apply saved theme immediately -->
  <script>
    (function () {
      document.documentElement.dataset.theme = localStorage.getItem('rp-theme') || 'light';
    })();
  </script>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="wrap">

    <!-- HEADER -->
    <header>
      <div class="header-left">
        <div class="app-icon">📋</div>
        <div>
          <div class="app-title">Recruitment <span>Planner</span></div>
          <div class="app-sub">// priority · timeline · budget</div>
        </div>
      </div>

      <div class="header-right">
        <div id="hdr-stats" style="display:flex;gap:8px;align-items:center;"></div>

        <div class="theme-toggle" onclick="toggleTheme()" title="Switch theme">
          <span class="tt-opt" id="tt-light">☀ Light</span>
          <span class="tt-opt" id="tt-dark">🌙 Dark</span>
        </div>
      </div>
    </header>

    <!-- EXECUTIVE SUMMARY -->
    <div id="exec-summary" class="exec-summary-panel"></div>

  <!-- MAIN LAYOUT -->
  <div class="main-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <!-- TAB NAV -->
      <div class="tab-nav">
        <button class="tab-btn" id="tab-dashboard" onclick="switchTab('dashboard')">
          <span class="tab-dot"></span>Dashboard
        </button>
        <button class="tab-btn active" id="tab-priority" onclick="switchTab('priority')">
          <span class="tab-dot"></span>Priority Order
        </button>
        <button class="tab-btn" id="tab-gantt" onclick="switchTab('gantt')">
          <span class="tab-dot"></span>Gantt Chart
        </button>
      </div>
    </div>

    <!-- MAIN AREA -->
    <div class="main-area">
      <!-- TOOLBAR -->
      <div class="toolbar">
        <span class="toolbar-label">Data</span>
        <button class="tool-btn" onclick="exportCSV()">📄 Export CSV</button>
        <button class="tool-btn" onclick="clearSave()">🗑 Reset data</button>
        <span class="save-indicator" id="saveIndicator">● Initialising…</span>
        <span id="client-filter-chip" class="chip hidden"></span>
      </div>

      <!-- SUMMARY -->
      <div class="summary-row" id="summary-row"></div>

      <!-- PRIORITY ORDER VIEW -->
      <div id="view-priority">

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Priority Order</span>
            <span class="badge" id="role-count">0 roles</span>
          </div>

          <!-- Filters -->
          <div style="padding:8px 10px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;gap:6px;">
            <input id="list-search" class="fi" placeholder="🔍 Search roles..." oninput="filterList()" />
            <select id="list-filter-status" class="fi" onchange="filterList()">
              <option value="">All statuses</option>
              <option value="active">Active</option>
              <option value="approved">Approved</option>
              <option value="pending">Pending</option>
              <option value="onhold">On Hold</option>
              <option value="filled">Filled</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>

          <!-- List -->
          <div class="drag-list-wrap">
            <div class="drag-list" id="dragList"></div>
            <div class="drag-list-fade" id="listFade"></div>
            <div class="scroll-hint" id="scrollHint">↓ scroll for more</div>
          </div>

          <!-- ADD FORM -->
          <div class="add-form">
            <div class="fg">
              <label class="fl">Role Title</label>
              <input class="fi" id="f-name" placeholder="e.g. Senior Backend Engineer" />
            </div>

            <div class="fg2">
              <div>
                <label class="fl">Department</label>
                <select class="fi" id="f-dept">
                  <option>Engineering</option>
                  <option>Product</option>
                  <option>Design</option>
                  <option>Sales</option>
                  <option>Marketing</option>
                  <option>Operations</option>
                  <option>Finance</option>
                  <option>HR</option>
                  <option>Data</option>
                  <option>Other</option>
                </select>
              </div>

              <div>
                <label class="fl">Client</label>
                <input class="fi" id="f-client" list="client-options" placeholder="Select or type a client..." />
              </div>

              <div>
                <label class="fl">Priority</label>
                <select class="fi" id="f-priority">
                  <option value="critical">Critical</option>
                  <option value="high">High</option>
                  <option value="medium" selected>Medium</option>
                  <option value="low">Low</option>
                </select>
              </div>
            </div>

            <div class="fg">
              <label class="fl">Hiring Status</label>
              <select class="fi" id="f-status">
                <option value="active">Active — Hiring Now</option>
                <option value="approved">Approved — Not Started</option>
                <option value="pending">Pending Approval</option>
                <option value="onhold">On Hold</option>
                <option value="filled">Filled</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>

            <div class="form-section-hdr">Timeline</div>
            <div class="fg2">
              <div>
                <label class="fl">Start Date</label>
                <input class="fi" id="f-start" type="date" />
              </div>
              <div>
                <label class="fl">Completion Date</label>
                <input class="fi" id="f-end" type="date" />
              </div>
            </div>

            <label class="check-row">
              <input type="checkbox" id="f-confirmed" />
              <span class="checkmark"></span>
              <span>Resource confirmed — lock bar to green</span>
            </label>

            <div class="form-section-hdr">Salary Range</div>
            <div class="fg2">
              <div>
                <label class="fl">Best Case (£)</label>
                <input class="fi" id="f-sal-best" type="number" min="0" />
              </div>
              <div>
                <label class="fl">Worst Case (£)</label>
                <input class="fi" id="f-sal-worst" type="number" min="0" />
              </div>
            </div>

            <button class="add-btn" onclick="addRole()">+ Add Role to Pipeline</button>
          </div>
        </div>

      </div>

      <!-- GANTT VIEW -->
      <div id="view-gantt" style="display:none">

        <div class="panel gantt-panel">
          <div class="panel-header">
            <span class="panel-title">Ramp-Up Gantt — Today → Future</span>
            <span class="badge" id="gantt-range">—</span>
          </div>

          <div class="gantt-scroll">
            <div id="gantt-inner"></div>
          </div>
        </div>

      </div>

      <!-- DASHBOARD -->
      <div id="view-dashboard" style="display:none">
        <div id="dash-inner"></div>
      </div>
    </div>
  </div>
      </div>
    </div>
  </div>

  </div>

  <!-- CLIENT OPTIONS (shared) -->
  <datalist id="client-options"></datalist>

  <!-- EDIT DRAWER -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="editDrawer">
    <div class="drawer-header">
      <div>
        <div class="drawer-eyebrow">Edit Role</div>
        <div class="drawer-title" id="drawer-title">Role Name</div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>

    <div class="drawer-body">
      <div class="fg">
        <label class="fl">Role Title</label>
        <input class="fi" id="e-name" />
      </div>

      <div class="fg">
        <label class="fl">Client</label>
        <input class="fi" id="e-client" list="client-options" />
      </div>

      <div class="fg2">
        <div>
          <label class="fl">Department</label>
          <select class="fi" id="e-dept">
            <option>Engineering</option>
            <option>Product</option>
            <option>Design</option>
            <option>Sales</option>
            <option>Marketing</option>
            <option>Operations</option>
            <option>Finance</option>
            <option>HR</option>
            <option>Data</option>
            <option>Other</option>
          </select>
        </div>

        <div>
          <label class="fl">Priority</label>
          <select class="fi" id="e-priority">
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
      </div>

      <div class="fg">
        <label class="fl">Hiring Status</label>
        <select class="fi" id="e-status">
          <option value="active">Active</option>
          <option value="approved">Approved</option>
          <option value="pending">Pending</option>
          <option value="onhold">On Hold</option>
          <option value="filled">Filled</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>

      <div class="form-section-hdr">Timeline</div>
      <div class="fg2">
        <div>
          <label class="fl">Start Date</label>
          <input class="fi" id="e-start" type="date" />
        </div>
        <div>
          <label class="fl">Completion Date</label>
          <input class="fi" id="e-end" type="date" />
        </div>
      </div>

      <label class="check-row">
        <input type="checkbox" id="e-confirmed" />
        <span class="checkmark"></span>
        <span>Resource confirmed</span>
      </label>

      <div class="form-section-hdr">Salary Range</div>
      <div class="fg2">
        <div>
          <label class="fl">Best Case (£)</label>
          <input class="fi" id="e-sal-best" type="number" />
        </div>
        <div>
          <label class="fl">Worst Case (£)</label>
          <input class="fi" id="e-sal-worst" type="number" />
        </div>
      </div>
    </div>

    <div class="drawer-footer">
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
      <button class="btn-cancel" onclick="closeDrawer()">Cancel</button>
    </div>
  </div>

  <div class="tooltip" id="tip"></div>

  <!-- App JS -->
  <script src="app.js"></script>
</body>
</html>
